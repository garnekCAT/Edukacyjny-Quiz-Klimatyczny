<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
  >
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../static/css/style2.css">
  <title>Ekologiczny Quiz</title>
</head>
<body>
  <header class="header">
    <div class="header__text">
      <h1>Odpowiedz na pytania i dowiedz się więcej!</h1>
    </div>
  </header>
  <main>
    {% block content %}
    <h2 class="main__title">Które z poniższych przyczyn NIE są dopowiedzialne za globalne ocieplenie? </h2>
    <ul class="list" id="list">
      <li class="list__item">
        <form action="/pyt10" method="POST">
            <input type="hidden" name="score" value="{{ score }}">
            <button type="submit" class="list__item"><span>Samochody</span></button>
        </form>
      </li>
      <!--Assignment #2 -->
      <li class="list__item">
        <form action="/pyt10" method="POST">
            <input type="hidden" name="score" value="{{ score |  int + 10 }}">
            <button type="submit" class="list__item"><span>Zatrzymywanie ciepła <br> przez morza i oceany</span></button>
        </form>
      </li>
      <li class="list__item">
        <form action="/pyt10" method="POST">
            <input type="hidden" name="score" value="{{ score }}">
            <button type="submit" class="list__item"><span>Duży udział w produkcji <br> energi elektrowni cieplnych</span></button>
        </form>
      </li>
    </ul>
    {% endblock %}
  </main>
</body>
</html>

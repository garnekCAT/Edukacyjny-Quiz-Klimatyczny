<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
  >
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../static/css/style.css">
  <title>Ekologiczny Quiz</title>
</head>
<body>
  <header class="header">
    <div class="header__text">
      <h1>Odpowiedz na pytania i dowiedz się więcej!</h1>
    </div>
  </header>
  <main>
    {% block content %}
    <h2 class="main__title">Który gaz cieplarniany jest emitowany w największej ilości przez działalność człowieka?</h2>
    <ul class="list" id="list">
      <li class="list__item">
        <form action="/pyt2" method="POST">
            <input type="hidden" name="score" value="{{ score }}">
            <button type="submit" class="list__item"><span>Metan</span></button>
        </form>
      </li>
      <!--Assignment #2 -->
      <li class="list__item">
        <form action="/pyt2" method="POST">
            <input type="hidden" name="score" value="{{ score | int + 10}}">
            <button type="submit" class="list__item"><span>Dwutlenek węgla</span></button>
        </form>
      </li>
      <li class="list__item">
        <form action="/pyt2" method="POST">
            <input type="hidden" name="score" value="{{ score }}">
            <button type="submit" class="list__item"><span>Podtlenek azotu</span></button>
        </form>
      </li>
    </ul>
    {% endblock %}
  </main>
</body>
</html>

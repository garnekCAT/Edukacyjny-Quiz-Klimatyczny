<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
  >
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../static/css/style.css">
  <title>Wyniki</title>
</head>
<body>
  <header class="header">
    <div class="header__text">
      <h1>Oto twoja punktacja!</h1>
    </div>
  </header>
  <main>
    {% block content %}
    <h2 class="main__title">Zdobyłeś {{ score }} punktów ze 100!</h2>
    <ul class="list" id="list">
      <li class="list__item">
        <form action="/pyt1" method="POST">
            <input type="hidden" name="score" value="{{ score }}">
            <button type="submit" class="list__item"><span>Rozpocznij quiz ponownie!</span></button>
        </form>
      </li>
    </ul>
    {% endblock %}
  </main>
</body>
</html>

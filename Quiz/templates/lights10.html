<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
  >
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../static/css/style2.css">
  <title>Ekologiczny Quiz</title>
</head>
<body>
  <header class="header">
    <div class="header__text">
      <h1>Odpowiedz na pytania i dowiedz się więcej!</h1>
    </div>
  </header>
  <main>
    {% block content %}
    <h2 class="main__title">Co jest kluczowe w walce ze zmianami klimatu?</h2>
    <ul class="list" id="list">
      <li class="list__item">
        <form action="/wynik" method="POST">
            <input type="hidden" name="score" value="{{ score }}">
            <button type="submit" class="list__item"><span>Poruszanie się dużym <br> samochodem w pojedynkę</span></button>
        </form>
      </li>
      <li class="list__item">
        <form action="/wynik" method="POST">
            <input type="hidden" name="score" value="{{ score }}">
            <button type="submit" class="list__item"><span>Sporzywanie dużych <br> ilości mięsa</span></button>
        </form>
      </li>
      <li class="list__item">
        <form action="/wynik" method="POST">
            <input type="hidden" name="score" value="{{ score | int + 10 }}">
            <button type="submit" class="list__item"><span>Korzystanie z transportu <br> zbiorowego</span></button>
        </form>
      </li>
    </ul>
    {% endblock %}
  </main>
</body>
</html>
